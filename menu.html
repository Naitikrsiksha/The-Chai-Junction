<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — AN Cafe</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .page-hero {
      padding: 9rem 0 4rem;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(200,134,10,0.06) 0%, transparent 70%),
        var(--bg-dark);
      text-align: center;
      border-bottom: 1px solid rgba(200,134,10,0.1);
    }
    .page-hero h1 { margin-bottom: 1rem; }
    .page-hero p  { font-size: 1.05rem; max-width: 500px; margin: 0 auto; }

    /* ── Filter bar ────────────────────────────────────── */
    .filter-bar {
      position: sticky;
      top: 64px;
      z-index: 100;
      background: rgba(15, 8, 0, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(200,134,10,0.12);
      padding: 1rem 0;
    }

    .filter-bar .container {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-bar .container::-webkit-scrollbar { display: none; }

    .filter-btn {
      white-space: nowrap;
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      border: 1px solid rgba(200,134,10,0.25);
      background: transparent;
      color: var(--cream-dim);
      font-family: var(--font-sans);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg-dark);
    }

    /* ── Menu Grid ────────────────────────────────────── */
    .menu-section { padding: 4rem 0; }

    .category-section { margin-bottom: 4rem; }

    .category-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .category-header h2 {
      font-size: 1.8rem;
      white-space: nowrap;
    }

    .category-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(200,134,10,0.3), transparent);
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    /* ── Menu Item Card ───────────────────────────────── */
    .item-card {
      background: var(--bg-card);
      border: 1px solid rgba(200,134,10,0.12);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .item-card:hover {
      border-color: rgba(200,134,10,0.35);
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
    }

    .item-emoji {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      background: var(--bg-section);
    }

    .item-body {
      padding: 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .item-name {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      margin-bottom: 0.35rem;
    }

    .item-desc {
      font-size: 0.83rem;
      color: var(--cream-dim);
      margin-bottom: auto;
      padding-bottom: 1rem;
    }

    .item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .item-price {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      color: var(--gold-light);
    }

    /* Qty control */
    .qty-control {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(200,134,10,0.4);
      background: transparent;
      color: var(--gold);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .qty-btn:hover {
      background: var(--gold);
      color: var(--bg-dark);
    }

    .qty-num {
      font-size: 0.95rem;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
      color: var(--cream);
    }

    /* ── Floating Cart ────────────────────────────────── */
    .cart-fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--gold);
      color: var(--bg-dark);
      border: none;
      border-radius: 100px;
      padding: 1rem 1.8rem;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 8px 24px rgba(200,134,10,0.4);
      transition: var(--transition);
      z-index: 500;
      transform: translateY(100px);
      opacity: 0;
    }

    .cart-fab.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .cart-fab:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    .cart-fab .cart-count {
      background: var(--bg-dark);
      color: var(--gold);
      border-radius: 50%;
      width: 24px; height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
    }

    /* ── Cart Drawer ──────────────────────────────────── */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .cart-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .cart-drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(420px, 100vw);
      background: var(--bg-section);
      border-left: 1px solid rgba(200,134,10,0.2);
      z-index: 900;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.open { transform: translateX(0); }

    .cart-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-header h3 { font-size: 1.2rem; }

    .cart-close {
      background: none;
      border: none;
      color: var(--cream-dim);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }

    .cart-close:hover { color: var(--cream); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .cart-item-emoji { font-size: 1.8rem; width: 40px; text-align: center; }

    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.9rem; font-weight: 500; color: var(--cream); }
    .cart-item-sub  { font-size: 0.8rem; color: var(--cream-dim); }

    .cart-item-price {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--gold-light);
    }

    .cart-item-remove {
      background: none;
      border: none;
      color: rgba(201,185,154,0.35);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      transition: color 0.2s;
    }

    .cart-item-remove:hover { color: #cf6f6f; }

    .cart-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--cream-dim);
    }

    .cart-empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    .cart-footer {
      padding: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .cart-total .label { font-size: 0.85rem; color: var(--cream-dim); }
    .cart-total .amount {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      color: var(--gold-light);
    }

    .loading-state {
      text-align: center;
      padding: 5rem 2rem;
    }
  </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">AN <span>Cafe</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html" class="active">Menu</a></li>
    <li><a href="order.html">Order</a></li>
    <li><a href="order.html#booking">Reservations</a></li>
    <li><a href="order.html" class="nav-cta">Order Now</a></li>
  </ul>
  <div class="nav-hamburger"><span></span><span></span><span></span></div>
</nav>

<!-- ── Page Hero ──────────────────────────────────────────── -->
<div class="page-hero">
  <div class="container">
    <span class="section-label">What we serve</span>
    <h1>Our Menu</h1>
    <p>From the first espresso shot to the last dessert — everything made with love.</p>
  </div>
</div>

<!-- ── Filter Bar ─────────────────────────────────────────── -->
<div class="filter-bar" id="filter-bar">
  <div class="container">
    <button class="filter-btn active" data-cat="All">All</button>
    <button class="filter-btn" data-cat="Coffee">☕ Coffee</button>
    <button class="filter-btn" data-cat="Beverages">🥤 Beverages</button>
    <button class="filter-btn" data-cat="Food">🍽️ Food</button>
    <button class="filter-btn" data-cat="Desserts">🍫 Desserts</button>
  </div>
</div>

<!-- ── Menu Content ───────────────────────────────────────── -->
<section class="menu-section">
  <div class="container" id="menu-container">
    <div class="loading-state">
      <div class="loader"></div>
      <p style="color:var(--cream-dim);margin-top:1rem;">Loading menu...</p>
    </div>
  </div>
</section>

<!-- ── Cart FAB ────────────────────────────────────────────── -->
<button class="cart-fab" id="cart-fab" onclick="openCart()">
  🛒 View Cart
  <span class="cart-count" id="cart-count">0</span>
</button>

<!-- ── Cart Drawer ─────────────────────────────────────────── -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h3>Your Order</h3>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="cart-empty">
      <div class="icon">🛒</div>
      <p>Your cart is empty</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="label">Total</span>
      <span class="amount" id="cart-total">₹0</span>
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="proceedToOrder()">
      Proceed to Order →
    </button>
  </div>
</div>

<!-- ── Footer ──────────────────────────────────────────────── -->
<footer class="footer" style="margin-top:4rem;">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2024 AN Cafe. All rights reserved.</span>
      <a href="index.html" style="color:var(--gold);">← Back to Home</a>
    </div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
